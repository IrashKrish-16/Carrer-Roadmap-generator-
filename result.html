<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">

</head>

<body class="result-page">

<div class="bg1"></div>
<div class="bg2"></div>

<div class="dashboard">

<h1>🚀 {{role}} Roadmap</h1>

<p>Your personalized journey begins here</p>

<div class="progress">

<div class="progress-bar" style="width:0%">

0%

</div>

</div>

{% for skill,time,project,resource in roadmap %}

<div class="glass-card">

<div>

<h2>{{skill}}</h2>

<p>📅 {{time}}</p>

<p>Complete this before moving ahead</p>

</div>

<button onclick="markDone(this)">

Complete

</button>

</div>

{% if not loop.last %}

<div class="arrow">

⬇

</div>

{% endif %}

{% endfor %}

</div>

<script src=
"{{url_for('static',
filename='script.js')}}">
</script>

</body>

</html>
